<!-- ordered list comes with numbering -->
<ol>
    <li>Item 1</li>
    <li>Item 2</li>
    <li>Item 3</li>
</ol>
<!-- unordered list comes with bullets -->
<ul>
    <li>Item A</li>
    <li>Item B</li>
    <li>Item C</li>
</ul>
<!-- description list comes with terms and definitions -->
<dl>
    <dt>Term 1</dt> <!-- description term -->
    <dd>Definition 1</dd> <!-- description definition -->
    <dt>Term 2</dt>
    <dd>Definition 2</dd>
    <dt>Term 3</dt>
    <dd>Definition 3</dd>
</dl>
