<h1>This is an audio tag</h1>
<audio src="I Wanna Be Yours.mp3" controls></audio>
<h1>This one plays automatically when triggered</h1>
<audio src="I Wanna Be Yours.mp3" controls autoplay></audio>
<h1>This one loops after the song finishes</h1>
<audio src="I Wanna Be Yours.mp3" controls autoplay loop></audio>
<h1>This one is muted</h1>
<audio src="I Wanna Be Yours.mp3" controls autoplay loop muted></audio>
<h1>This one has multiple sources and without need of browser inspecting the file</h1>
<audio controls>
    <source src="I Wanna Be Yours.mp3" type="audio/mpeg">
</audio>
